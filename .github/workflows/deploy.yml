name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build shared
        run: pnpm --filter @pis/shared build

      - name: Build Web
        run: pnpm --filter @pis/web build

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

      - name: Upload API source
        uses: actions/upload-artifact@v4
        with:
          name: api-src
          path: packages/api/src/
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist/

      - name: Download API source
        uses: actions/download-artifact@v4
        with:
          name: api-src
          path: api-src/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Web
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            web-dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/kanban.myaipro.ru/public_html/

      - name: Deploy API source
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude='__tests__' \
            api-src/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/kanban-app/packages/api/src/

      - name: Restart API
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "pm2 restart kanban-api && pm2 save"
