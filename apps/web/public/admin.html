<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIS Admin Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }
  .login-box { max-width: 400px; margin: 100px auto; background: #1e293b; border-radius: 16px; padding: 32px; border: 1px solid #334155; }
  .login-box h2 { font-size: 20px; margin-bottom: 20px; text-align: center; }
  input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 14px; margin-bottom: 12px; outline: none; }
  input:focus { border-color: #6366f1; }
  .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #6366f1; color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #4f46e5; }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 12px; }
  .top-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
  .card-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .card-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
  th { background: #334155; padding: 12px 16px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; font-weight: 600; }
  td { padding: 12px 16px; border-top: 1px solid #1e293b; font-size: 13px; }
  tr:hover td { background: #1e293b99; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge-admin { background: #6366f122; color: #818cf8; }
  .badge-user { background: #10b98122; color: #34d399; }
  .stat-bar { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-item { font-size: 11px; color: #94a3b8; }
  .stat-item strong { color: #e2e8f0; }
  .tg-id { font-family: monospace; color: #f59e0b; font-size: 12px; }
  .refresh-btn { background: #334155; border: 1px solid #475569; color: #94a3b8; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { background: #475569; color: #e2e8f0; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  @media (max-width: 768px) { .container { padding: 16px; } td, th { padding: 8px; font-size: 12px; } }
</style>
</head>
<body>

<div id="login" style="display:none">
  <div class="login-box">
    <h2>PIS Admin</h2>
    <div id="login-error" class="error" style="display:none"></div>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button class="btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="container">
    <div class="header">
      <div>
        <h1>PIS Admin Panel</h1>
        <div class="subtitle">User management & usage statistics</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="refresh-btn" onclick="loadStats()">Refresh</button>
        <button class="refresh-btn" onclick="logout()" style="color:#ef4444">Sign Out</button>
      </div>
    </div>

    <div class="top-cards" id="top-cards"></div>

    <!-- User edit modal -->
    <div id="user-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center">
      <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;width:100%;max-width:440px;margin:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="margin:0">Редактировать пользователя</h3>
          <button onclick="closeUserModal()" style="background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer">×</button>
        </div>
        <div id="user-modal-error" class="error" style="display:none;margin-bottom:12px"></div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <label style="font-size:12px;color:#94a3b8">ID <span id="um-id" style="color:#fff"></span></label>
          <label style="font-size:12px;color:#94a3b8">Имя
            <input id="um-name" style="width:100%;padding:8px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#fff;margin-top:4px" />
          </label>
          <label style="font-size:12px;color:#94a3b8">Email
            <input id="um-email" type="email" style="width:100%;padding:8px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#fff;margin-top:4px" />
          </label>
          <label style="font-size:12px;color:#94a3b8">Роль
            <select id="um-role" style="width:100%;padding:8px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#fff;margin-top:4px">
              <option value="user">user</option>
              <option value="admin">admin</option>
            </select>
          </label>
          <label style="font-size:12px;color:#94a3b8">Telegram ID
            <input id="um-tg" style="width:100%;padding:8px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#fff;margin-top:4px" placeholder="пусто — отвязать" />
          </label>
          <hr style="border:none;border-top:1px solid #334155;margin:8px 0" />
          <label style="font-size:12px;color:#94a3b8">Сбросить пароль (необязательно)
            <input id="um-password" type="text" placeholder="новый пароль (мин 4 символа)"
              style="width:100%;padding:8px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#fff;margin-top:4px" />
          </label>
          <div style="display:flex;gap:8px;justify-content:space-between;margin-top:12px">
            <button class="btn" onclick="deleteUser()" style="background:#ef4444">🗑 Удалить</button>
            <div style="display:flex;gap:8px">
              <button class="refresh-btn" onclick="closeUserModal()">Отмена</button>
              <button class="btn" onclick="saveUser()" style="background:#10b981">Сохранить</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <h2 style="font-size:18px;margin-bottom:16px">Users</h2>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>TG ID</th>
            <th>Data</th>
            <th>Disk</th>
            <th>AI Tokens</th>
            <th>Transcriptions</th>
            <th>Registered</th>
          </tr>
        </thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = '/v1';
let token = localStorage.getItem('admin_token');

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function formatNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('ru-RU', { day: '2-digit', month: 'short', year: 'numeric' });
}

async function doLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Login failed');
    if (data.data.user.role !== 'admin') throw new Error('Admin access required');
    token = data.data.token;
    localStorage.setItem('admin_token', token);
    showDashboard();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function logout() {
  token = null;
  localStorage.removeItem('admin_token');
  showLogin();
}

async function loadStats() {
  try {
    const res = await fetch(API + '/admin/stats', { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    render(data.data);
  } catch (e) {
    console.error(e);
  }
}

function render(d) {
  const totalTokens = d.users.reduce((s, u) => s + u.tokens.input + u.tokens.output, 0);
  const totalTranscriptions = d.users.reduce((s, u) => s + u.transcriptions, 0);
  const totalDisk = d.users.reduce((s, u) => s + u.disk_bytes, 0);

  document.getElementById('top-cards').innerHTML = `
    <div class="card">
      <div class="card-label">Users</div>
      <div class="card-value">${d.total_users}</div>
    </div>
    <div class="card">
      <div class="card-label">Database</div>
      <div class="card-value">${formatBytes(d.db_size_bytes)}</div>
    </div>
    <div class="card">
      <div class="card-label">AI Tokens Used</div>
      <div class="card-value">${formatNum(totalTokens)}</div>
      <div class="card-sub">~$${((totalTokens / 1e6) * 3).toFixed(2)} est.</div>
    </div>
    <div class="card">
      <div class="card-label">Transcriptions</div>
      <div class="card-value">${totalTranscriptions}</div>
      <div class="card-sub">whisper.cpp (free)</div>
    </div>
    <div class="card">
      <div class="card-label">Attachments</div>
      <div class="card-value">${formatBytes(totalDisk)}</div>
    </div>
  `;

  document.getElementById('users-table').innerHTML = d.users.map(u => `
    <tr style="cursor:pointer" onclick="openUserModal(${u.id})" title="Клик — открыть редактор">
      <td>${u.id}</td>
      <td><strong>${u.name || '—'}</strong></td>
      <td>${u.email}</td>
      <td><span class="badge badge-${u.role}">${u.role}</span></td>
      <td>${u.tg_id ? '<span class="tg-id">' + u.tg_id + '</span>' : '<span style="color:#475569">—</span>'}</td>
      <td>
        <div class="stat-bar">
          <span class="stat-item"><strong>${u.stats.tasks}</strong> tasks</span>
          <span class="stat-item"><strong>${u.stats.projects}</strong> proj</span>
          <span class="stat-item"><strong>${u.stats.meetings}</strong> meet</span>
          <span class="stat-item"><strong>${u.stats.people}</strong> ppl</span>
          <span class="stat-item"><strong>${u.stats.ideas}</strong> ideas</span>
          <span class="stat-item"><strong>${u.stats.habits}</strong> habits</span>
        </div>
      </td>
      <td>${formatBytes(u.disk_bytes)}</td>
      <td>
        <div>${formatNum(u.tokens.input + u.tokens.output)} tok</div>
        <div style="font-size:11px;color:#64748b">${u.tokens.calls} calls</div>
      </td>
      <td>${u.transcriptions}</td>
      <td style="font-size:12px;color:#64748b">${formatDate(u.created_at)}</td>
    </tr>
  `).join('');
}

let editingUserId = null;

async function openUserModal(id) {
  editingUserId = id;
  document.getElementById('user-modal-error').style.display = 'none';
  document.getElementById('um-password').value = '';
  try {
    const res = await fetch(API + '/admin/users/' + id, { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    const u = data.data;
    document.getElementById('um-id').textContent = u.id;
    document.getElementById('um-name').value = u.name || '';
    document.getElementById('um-email').value = u.email || '';
    document.getElementById('um-role').value = u.role || 'user';
    document.getElementById('um-tg').value = u.tg_id || '';
    document.getElementById('user-modal').style.display = 'flex';
  } catch (e) {
    alert('Не удалось загрузить: ' + e.message);
  }
}

function closeUserModal() {
  editingUserId = null;
  document.getElementById('user-modal').style.display = 'none';
}

async function saveUser() {
  if (!editingUserId) return;
  const errEl = document.getElementById('user-modal-error');
  errEl.style.display = 'none';
  const body = {
    name: document.getElementById('um-name').value.trim() || undefined,
    email: document.getElementById('um-email').value.trim() || undefined,
    role: document.getElementById('um-role').value,
    tg_id: document.getElementById('um-tg').value.trim() || null,
  };
  const newPassword = document.getElementById('um-password').value.trim();
  try {
    const r = await fetch(API + '/admin/users/' + editingUserId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error);

    if (newPassword) {
      const r2 = await fetch(API + '/admin/users/' + editingUserId + '/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ password: newPassword }),
      });
      const d2 = await r2.json();
      if (!d2.success) throw new Error(d2.error);
    }
    closeUserModal();
    loadStats();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

async function deleteUser() {
  if (!editingUserId) return;
  if (!confirm('Удалить пользователя #' + editingUserId + ' со всеми его данными? Это необратимо.')) return;
  try {
    const r = await fetch(API + '/admin/users/' + editingUserId, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + token },
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    closeUserModal();
    loadStats();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

function showLogin() {
  document.getElementById('login').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
}

function showDashboard() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadStats();
}

// Init
document.addEventListener('keydown', e => { if (e.key === 'Enter' && !token) doLogin(); });

if (token) {
  // Verify token is still valid
  fetch(API + '/auth/me', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.json())
    .then(d => { if (d.success && d.data.role === 'admin') showDashboard(); else showLogin(); })
    .catch(() => showLogin());
} else {
  showLogin();
}
</script>
</body>
</html>
